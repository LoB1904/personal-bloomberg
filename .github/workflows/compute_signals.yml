name: Compute Signals

on:
  schedule:
    # 07:00 UTC ogni giorno = 08:00 CET (09:00 CEST in ora legale)
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend

    env:
      # DB (config.py richiede SUPABASE_URL, SUPABASE_ANON_KEY e DATABASE_URL per l'import)
      DATABASE_URL:       ${{ secrets.DATABASE_URL }}
      SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
      # Fonti dati
      EODHD_API_KEY:      ${{ secrets.EODHD_API_KEY }}
      FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
      # AI + notifiche
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1 — Aggiorna fondamentali (yfinance + FMP fallback)
      - name: Ingest fundamentals (yfinance)
        id: fundamentals
        run: python -m app.ingestion.fundamentals_yf
        continue-on-error: true

      - name: Log fundamentals failure
        if: steps.fundamentals.outcome == 'failure'
        run: echo "::error::Ingestione fondamentali fallita"

      # 2 — Calcola screener
      - name: Run screener
        id: screener
        run: python -m app.analytics.screener
        continue-on-error: true

      - name: Log screener failure
        if: steps.screener.outcome == 'failure'
        run: echo "::error::Screener fallito — segnali non aggiornati"

      # 3 — Logga segnali paper trading
      - name: Run signal logger
        id: signal_logger
        run: python -m app.paper_trading.signal_logger
        continue-on-error: true

      - name: Log signal_logger failure
        if: steps.signal_logger.outcome == 'failure'
        run: echo "::error::Signal logger fallito — nessun nuovo segnale loggato"

      # 4 — Aggiorna P&L
      - name: Run P&L calculator
        id: pnl_calculator
        run: python -m app.paper_trading.pnl_calculator
        continue-on-error: true

      - name: Log pnl_calculator failure
        if: steps.pnl_calculator.outcome == 'failure'
        run: echo "::error::P&L calculator fallito — prezzi milestone non aggiornati"

      # 5 — Invia alert Telegram
      - name: Send Telegram alert
        id: telegram
        run: python -m app.notifications.telegram
        continue-on-error: true

      - name: Log telegram failure
        if: steps.telegram.outcome == 'failure'
        run: echo "::error::Invio alert Telegram fallito"

      - name: Summary
        if: always()
        run: |
          echo "### Compute Signals — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Esito |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| fundamentals (yfinance) | ${{ steps.fundamentals.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| screener                | ${{ steps.screener.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| signal_logger           | ${{ steps.signal_logger.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pnl_calculator          | ${{ steps.pnl_calculator.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| telegram                | ${{ steps.telegram.outcome }} |" >> $GITHUB_STEP_SUMMARY
