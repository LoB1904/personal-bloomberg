name: ingest_daily

# Ingestione prezzi EOD giornaliera.
# Schedulato dopo la chiusura di Wall Street (NYSE chiude 16:00 ET = 22:00 CET inverno, 21:00 CET estate).
# 23:30 UTC = 00:30 CET inverno / 01:30 CEST estate -> sicuro post-close NYSE su tutto l'anno.

on:
  schedule:
    - cron: "30 23 * * 1-5"   # Lun-Ven, 23:30 UTC
  workflow_dispatch:            # consente trigger manuale dalla UI di GitHub
    inputs:
      days:
        description: "Giorni di storico da scaricare (default 5)"
        required: false
        default: "5"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test ingestion (20 ticker)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_ENV: prod
          LOG_LEVEL: INFO
        run: |
          python -m app.ingestion.test_ingest --days ${{ github.event.inputs.days || '5' }}
